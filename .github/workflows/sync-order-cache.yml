# 每日將 Mouser / DigiKey 訂單寫入 data/order-cache/*.json，供 GitHub Pages 靜態讀取（無需 Vercel）
name: Sync order cache

on:
  schedule:
    # 台灣時間約每日 00:30（UTC 前一日 16:30）
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-order-cache
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync order JSON
        env:
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          MOUSER_API_VERSION: ${{ secrets.MOUSER_API_VERSION }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
          DIGIKEY_ACCOUNT_ID: ${{ secrets.DIGIKEY_ACCOUNT_ID }}
        run: node scripts/sync-order-cache.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/order-cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync order cache [skip ci]"
            git push
          fi
