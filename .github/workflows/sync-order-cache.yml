# 定期將 Mouser / DigiKey 訂單寫入 data/order-cache/*.json，供 GitHub Pages 靜態讀取（無需 Vercel）
name: Sync order cache

on:
  schedule:
    # 每 6 小時一次（UTC 整點：0、6、12、18；台灣時間約 08:00、14:00、20:00、次日 02:00）
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-order-cache
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # 見 GitHub：actions 預設將改為 Node 24；先啟用以免棄用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync order JSON
        env:
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          MOUSER_API_VERSION: ${{ secrets.MOUSER_API_VERSION }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
          DIGIKEY_ACCOUNT_ID: ${{ secrets.DIGIKEY_ACCOUNT_ID }}
        run: node scripts/sync-order-cache.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/order-cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync order cache [skip ci]"
            # 遠端若比你先 push（例如同時有人 commit），先 rebase 再送，避免 non-fast-forward
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi
