<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM 旗艦備料系統 V1.5 (區段過濾增強版)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0046ad; --digikey: #cc0000; --elem14: #ff6600; --light: #f4f6f9; --border: #e0e0e0; --success: #28a745; --info: #17a2b8; --purple: #6f42c1; --danger: #dc3545; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: var(--light); margin: 0; padding: 20px; color: #333; font-size: 16px; }
        .container { max-width: 95%; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); overflow: hidden; min-width: 1000px; }
        .stepper { display: flex; justify-content: space-between; padding: 25px 50px; background: #fafafa; border-bottom: 1px solid var(--border); }
        .step { text-align: center; flex: 1; opacity: 0.5; font-weight: bold; font-size: 1.1em; }
        .step.active { opacity: 1; color: var(--primary); }
        .step i { display: block; font-size: 28px; margin-bottom: 8px; }
        .step-content { display: none; padding: 40px; }
        .step-content.active { display: block; }
        .upload-zone { border: 3px dashed #aaa; border-radius: 10px; padding: 80px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        .upload-zone:hover { border-color: var(--primary); background-color: #f0f7ff; }
        .settings-panel { display: flex; gap: 20px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        .setting-item { flex: 1; }
        .setting-item label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 1rem; color: #555; }
        .setting-item input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; font-weight: bold; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .selection-tools button { font-size: 1rem; padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 4px; margin-right: 8px; }
        .table-container { min-height: 400px; border: 1px solid #eee; border-radius: 4px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 1rem; }
        th { background: #eaeaea; padding: 15px; text-align: left; border-bottom: 2px solid #ccc; font-size: 1.05rem; white-space: nowrap; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr.excluded { background-color: #ffeef0; color: #aaa; text-decoration: line-through; }
        tr.selected { background-color: #e3f2fd; }
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9em; display: inline-block; white-space: nowrap; }
        .badge-smt { color: #0056b3; background: #dbeafe; border: 1px solid #b3d7ff; }
        .badge-gen { color: #5a32a3; background: #e9dffc; border: 1px solid #d1c4e9; }
        .badge-nm { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding: 10px; }
        .btn { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; color: white; flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-mouser { background: var(--primary); }
        .btn-digikey { background: var(--digikey); }
        .btn-elem14 { background: var(--elem14); }
    </style>
</head>
<body>

<div class="container">
    <div class="stepper">
        <div class="step active" id="nav-step1"><i class="fas fa-file-upload"></i> 1. 上傳原始 BOM</div>
        <div class="step" id="nav-step2"><i class="fas fa-microchip"></i> 2. 智慧雙重備料</div>
    </div>

    <div id="step1" class="step-content active">
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-robot" style="font-size: 80px; color: #0046ad; margin-bottom: 25px;"></i>
            <h3>拖曳或點擊上傳 BOM</h3>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleFile(this.files[0])" />
        </div>
    </div>

    <div id="step2" class="step-content">
        <div class="settings-panel">
            <div class="setting-item" style="flex: 2;">
                <label>專案名稱:</label>
                <input type="text" id="projectName">
            </div>
            <div class="setting-item">
                <label>製作套數:</label>
                <input type="number" id="batchSize" value="1" min="1" onchange="recalcAndRender()">
            </div>
            <div class="setting-item" style="background: #e3f2fd; padding: 5px 10px;">
                <label>SMT 拋料 (R/C/D):</label>
                <input type="number" id="smtBuffer" value="20" onchange="recalcAndRender()">
            </div>
            <div class="setting-item" style="background: #f3e5f5; padding: 5px 10px;">
                <label>其他備用 (IC/Conn):</label>
                <input type="number" id="genBuffer" value="1" onchange="recalcAndRender()">
            </div>
        </div>

        <div class="toolbar">
            <div class="selection-tools">
                <button onclick="selectAll(true)">全選</button>
                <button onclick="selectAll(false)">全不選</button>
            </div>
            <div id="selectionStats" style="font-weight: bold; color: var(--primary);">已選: 0</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="40"><input type="checkbox" id="masterCheck" onchange="selectAll(this.checked)"></th>
                        <th width="50">Item</th>
                        <th width="100">Part Ref</th>
                        <th>Description</th>
                        <th>MPN (料號)</th>
                        <th width="70">單量</th>
                        <th width="90">總量</th>
                        <th width="180">狀態</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="pagination" id="paginationControls">
            <button class="page-btn" onclick="changePage(-1)" id="btnPrev">❮ 上一頁</button>
            <span class="page-info" id="pageInfo">Page 1</span>
            <button class="page-btn" onclick="changePage(1)" id="btnNext">下一頁 ❯</button>
        </div>

        <div style="margin-top: 30px; padding: 25px; background: #f1f3f5;">
            <span style="font-weight:bold;"><i class="fas fa-file-export"></i> 匯出零件清單:</span>
            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <button class="btn btn-mouser" onclick="exportBOM('Mouser')">Mouser</button>
                <button class="btn btn-digikey" onclick="exportBOM('Digikey')">DigiKey</button>
                <button class="btn btn-elem14" onclick="exportBOM('Elem14')">Element14</button>
            </div>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    let tableRows = []; 
    let colMap = { item: -1, mfr: -1, part: -1, part_backup: -1, qty: -1, ref: -1, desc: -1 };
    let currentPage = 1;
    const itemsPerPage = 50;

    function handleFile(file) {
        if (!file) return;
        const now = new Date();
        document.getElementById('projectName').value = `A${String(now.getFullYear()).slice(-2)}_${file.name.split('.')[0]}`;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            analyzeHeader();
        };
        reader.readAsArrayBuffer(file);
    }

    function analyzeHeader() {
        let bestHeaderRow = 7; // 預設第8行
        for (let i = 0; i < Math.min(rawData.length, 20); i++) {
            const rowStr = rawData[i].join(" ").toLowerCase();
            if (rowStr.includes("qty") && (rowStr.includes("part") || rowStr.includes("pn"))) {
                bestHeaderRow = i;
                break;
            }
        }
        
        rawData[bestHeaderRow].forEach((cell, idx) => {
            const c = String(cell).toLowerCase().trim();
            if (c.includes("item") || c === "no.") colMap.item = idx;
            else if (c.includes("qty") || c.includes("quantity")) colMap.qty = idx;
            else if (c.includes("ref")) colMap.ref = idx;
            else if (c.includes("desc")) colMap.desc = idx;
            else if (c.includes("manufacturer pn") || c === "mpn") colMap.part = idx;
            else if (c.includes("manufacturer") && !c.includes("pn")) colMap.mfr = idx;
            else if (c === "part number" || c === "p/n") colMap.part_backup = idx;
        });

        if (colMap.part === -1) colMap.part = colMap.part_backup;
        processTableData(bestHeaderRow);
    }

    function processTableData(headerRowIndex) {
        tableRows = [];
        const excludeKeywords = ["TDK-INVENSENSE", "NO-LOAD", "DNP", "DNS", "UNUSED", "DO NOT STUFF"];
        let notMountMode = false; // 區段開關

        for (let i = headerRowIndex + 1; i < rawData.length; i++) {
            const row = rawData[i];
            if (!row || row.length === 0) continue;

            const rowStrAll = row.map(c => String(c)).join(" ").toUpperCase();
            
            // --- 區段開關觸發 ---
            if (rowStrAll.includes("NOT MOUNT:") || rowStrAll.includes("DO NOT INSTALL")) {
                notMountMode = true;
            }

            const qtyVal = parseFloat(row[colMap.qty]) || 0;
            const refVal = String(row[colMap.ref] || "").trim().toUpperCase();
            const descVal = String(row[colMap.desc] || "").trim().toUpperCase();
            const mfrVal = row[colMap.mfr] || "";
            const partVal = row[colMap.part] || "";

            if (!partVal && qtyVal === 0 && !notMountMode) continue;

            let isExcluded = false;
            let excludeReason = "";

            if (notMountMode) {
                isExcluded = true;
                excludeReason = "Not Mount (區段)";
            } else if (excludeKeywords.some(k => rowStrAll.includes(k))) {
                isExcluded = true;
                excludeReason = "No-Load (單行)";
            } else if (descVal === "PCB") {
                isExcluded = true;
                excludeReason = "PCB過濾";
            }

            // SMT 判斷 (R, C, L, D...)
            let isSmtPart = ["R", "C", "L", "D", "LED", "FB", "U", "Q"].some(p => refVal.startsWith(p));

            tableRows.push({ 
                id: i, item: row[colMap.item] || i, mfr: mfrVal, part: partVal, qty: qtyVal, 
                ref: refVal, desc: descVal, checked: !isExcluded, excluded: isExcluded, 
                excludeReason: excludeReason, isSmtPart: isSmtPart
            });
        }
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        recalcAndRender();
    }

    function recalcAndRender() {
        const batch = parseInt(document.getElementById('batchSize').value) || 1;
        const smtBuf = parseInt(document.getElementById('smtBuffer').value) || 0;
        const genBuf = parseInt(document.getElementById('genBuffer').value) || 0;

        tableRows.forEach(r => {
            r.finalQty = (r.qty * batch) + (r.excluded ? 0 : (r.isSmtPart ? smtBuf : genBuf));
        });
        renderPage();
        updateStats();
    }

    function renderPage() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const pageData = tableRows.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage);

        pageData.forEach(r => {
            const tr = document.createElement('tr');
            if (r.excluded) tr.className = 'excluded';
            else if (r.checked) tr.className = 'selected';

            tr.innerHTML = `
                <td><input type="checkbox" onchange="updateRow(${r.id}, this.checked)" ${r.checked ? 'checked' : ''} ${r.excluded ? 'disabled' : ''}></td>
                <td>${r.item}</td>
                <td title="${r.ref}">${r.ref.length > 15 ? r.ref.substring(0,12)+'...' : r.ref}</td>
                <td>${r.desc}</td>
                <td style="color:var(--primary); font-weight:bold;">${r.part}</td>
                <td>${r.qty}</td>
                <td style="font-weight:bold;">${r.finalQty}</td>
                <td>${r.excluded ? `<span class="badge badge-nm">${r.excludeReason}</span>` : 
                    (r.isSmtPart ? `<span class="badge badge-smt">SMT拋料</span>` : `<span class="badge badge-gen">一般備品</span>`)}</td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${Math.ceil(tableRows.length/itemsPerPage)}`;
    }

    function updateRow(id, checked) {
        const row = tableRows.find(r => r.id === id);
        if (row) { row.checked = checked; recalcAndRender(); }
    }

    function selectAll(checked) {
        tableRows.forEach(r => { if(!r.excluded) r.checked = checked; });
        recalcAndRender();
    }

    function changePage(delta) {
        currentPage += delta;
        renderPage();
    }

    function updateStats() {
        document.getElementById('selectionStats').innerText = `已選: ${tableRows.filter(r => r.checked).length} 筆`;
    }

    function exportBOM(platform) {
        const selected = tableRows.filter(r => r.checked && r.part);
        if (selected.length === 0) return alert("未選取零件");

        let output = [];
        if (platform === 'Elem14') {
            // Element14 格式: Part Number | Quantity | Line Note
            output.push(["Part Number", "Quantity", "Line Note"]);
            selected.forEach(r => output.push([r.part, r.finalQty, r.mfr]));
        } else {
            // Mouser & Digikey 通用格式
            output.push(["Item Number", "Manufacturer Name", "Manufacturer Part Number", "Quantity 1"]);
            selected.forEach(r => output.push([r.item, r.mfr, r.part, r.finalQty]));
        }

        const ws = XLSX.utils.aoa_to_sheet(output);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BOM");
        
        // 套用 14pt 粗體置中樣式
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let R = range.s.r; R <= range.e.r; ++R) {
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const cell = ws[XLSX.utils.encode_cell({r:R, c:C})];
                if (!cell) continue;
                cell.s = { alignment: { horizontal: "center" } };
                if (R === 0) cell.s.font = { bold: true, sz: 14 };
            }
        }

        XLSX.writeFile(wb, `${document.getElementById('projectName').value}_${platform}.xlsx`);
    }
</script>
</body>
</html>
